<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="유튜버 구독자 이벤트를 자동으로 찾아주는 커뮤니티. 기프티콘, 현금, 상품권 이벤트를 놓치지 마세요!">
    <meta name="theme-color" content="#E84E3B">
    <meta property="og:title" content="쌀먹이 - 유튜버 구독자 이벤트 커뮤니티">
    <meta property="og:description" content="유튜버 구독자 이벤트를 자동으로 찾아주는 커뮤니티">
    <meta property="og:type" content="website">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.json">
    <title>쌀먹이 - 유튜버 구독자 이벤트 커뮤니티</title>
    <style>
      :root {
        --color-primary: #E84E3B;
        --color-primary-dark: #D43D2B;
        --color-blue: #3B82F6;
        --color-bg: #f9fafb;
        --color-card: #ffffff;
        --color-border: #e5e7eb;
        --color-text: #111111;
        --color-text-secondary: #666666;
        --color-text-muted: #999999;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      }
      /* 항상 라이트모드 */
      /* 포커스 인디케이터 */
      button:focus-visible, a:focus-visible, [role="button"]:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
        outline: 2px solid var(--color-blue);
        outline-offset: 2px;
      }
      /* 최소 터치 타겟 */
      button, [role="button"] {
        min-height: 36px;
      }
      /* 스크롤바 */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
